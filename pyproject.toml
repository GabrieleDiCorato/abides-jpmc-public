[tool.uv.workspace]
members = ["abides-markets", "abides-gym"]

[tool.uv.sources]
abides-ng = { workspace = true }
abides-gym = { workspace = true }

[tool.black]
target-version = ["py312"]

[tool.pytest.ini_options]
testpaths = ["abides-core/tests", "abides-markets/tests"]
python_files = "test_*.py"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]
ignore = [
    "E501",  # line too long (handled by black; unavoidable in strings/comments)
    "N801",  # class name should use CapWords (some gym env names use _v0 suffix by convention)
    "N802",  # function name should be lowercase (conflicts with inherited wakeup/receiveMessage conventions)
    "N803",  # argument name should be lowercase
    "N806",  # variable in function should be lowercase
    "B006",  # mutable default argument (pre-existing patterns in orders and test helpers)
    "B008",  # function call in default argument (pre-existing patterns)
    "B028",  # no explicit stacklevel in warnings.warn (minor quality improvement, not a bug)
    "B905",  # zip() without explicit strict= (not yet required by project style)
    "UP007", # Use `X | Y` for union type annotations (project uses Optional consistently)
]

[tool.ruff.lint.isort]
known-first-party = ["abides_core", "abides_markets", "abides_gym"]

[tool.ruff.lint.per-file-ignores]
"abides-core/tests/*" = ["S101"]
"abides-markets/tests/*" = ["S101"]
"notebooks/*" = ["E402", "N801"]

[tool.coverage.run]
source = ["abides_core", "abides_markets", "abides_gym"]
omit = ["*/tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 0

[dependency-groups]
dev = [
    "abides-ng[test,docs]",
    "abides-gym",
    "black>=24.10.0",
    "build>=1.2.0",
    "ipykernel>=7.1.0",
    "mypy>=1.13.0",
    "nb-clean>=4.0.1",
    "pre-commit>=4.5.1",
    "ruff>=0.8.0",
    "twine>=5.1.0",
]
