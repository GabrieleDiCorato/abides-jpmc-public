[mypy]
ignore_missing_imports = True
warn_return_any = True
warn_unused_ignores = True

# ---------------------------------------------------------------------------
# Legacy suppressions — blanket ignore_errors = True
#
# Each section below suppresses ALL mypy errors for a file that predates
# strict typing.  The goal is to remove these one-by-one:
#   1. Run  mypy <module>  without ignore_errors to see current errors.
#   2. Fix or annotate with per-line  # type: ignore[code]  comments.
#   3. Delete the section here.
# ---------------------------------------------------------------------------

# Reason: TypeVar[T] generic base class requires complex constraint inference
[mypy-abides_core.generators]
ignore_errors = True

# Reason: Dict[str, Any] fields for flexible simulation state management
[mypy-abides_core.kernel]
ignore_errors = True

# Reason: dataclass inheritance chain with variable message types
[mypy-abides_core.message]
ignore_errors = True

# Reason: NumPy array broadcasting with mixed scalar/array operations
[mypy-abides_core.latency_model]
ignore_errors = True

# Reason: utility functions with intentionally flexible argument types
[mypy-abides_core.utils]
ignore_errors = True

# Reason: untyped constructor params conflicting with parent TradingAgent signature
[mypy-abides_markets.agents.examples.momentum_agent]
ignore_errors = True

# Reason: untyped constructor params conflicting with parent TradingAgent signature
[mypy-abides_markets.agents.examples.mean_reversion_agent]
ignore_errors = True

# Reason: large class with Dict[str, Any] storage and complex type unions
[mypy-abides_markets.agents.exchange_agent]
ignore_errors = True

# Reason: union-style parameter annotations with complex Optional patterns
[mypy-abides_markets.agents.market_makers.adaptive_market_maker_agent]
ignore_errors = True

# Reason: multiple Optional fields with legacy untyped initialization patterns
[mypy-abides_markets.agents.noise_agent]
ignore_errors = True

# Reason: wakeup() return type conflict in Agent → TradingAgent → ImpactOrderAgent
# hierarchy (TradingAgent.wakeup returns bool; Agent.wakeup returns None).
# The override convention across all built-in agents is → None.
[mypy-abides_markets.agents.impact_order_agent]
ignore_errors = True

# Reason: polymorphic Optional[Union[NanosecondTime, str]] parameters
[mypy-abides_markets.agents.pov_execution_agent]
ignore_errors = True

# Reason: base class with Dict[str, X] polymorphic storage, no TypedDict
[mypy-abides_markets.agents.trading_agent]
ignore_errors = True

# Reason: decorator functions with *args/**kwargs and untyped returns
[mypy-abides_markets.agents.utils]
ignore_errors = True

# Reason: parameter annotation mismatches (e.g. log_orders: float = False)
[mypy-abides_markets.agents.value_agent]
ignore_errors = True

# Reason: build function with 20+ untyped params and implicit dict construction
[mypy-abides_markets.configs.rmsc03]
ignore_errors = True

# Reason: Generic[T] ABC pattern with complex inference across implementations
[mypy-abides_markets.generators]
ignore_errors = True

# Reason: nested Dict[str, Dict[str, Any]] with dynamic key access
[mypy-abides_markets.oracles.sparse_mean_reverting_oracle]
ignore_errors = True

# Reason: nested Dict[str, Dict[str, Any]] with optional inner dict values
[mypy-abides_markets.oracles.mean_reverting_oracle]
ignore_errors = True

# Reason: deepcopy() of polymorphic Order subclasses without explicit return types
[mypy-abides_markets.order_book]
ignore_errors = True

# Reason: utility module with flexible argument types
[mypy-abides_markets.utils]
ignore_errors = True

# Reason: pydantic model_dump/model_validate/model_json_schema return Any in some mypy versions
[mypy-abides_markets.config_system]
ignore_errors = True

[mypy-abides_markets.config_system.models]
ignore_errors = True

[mypy-abides_markets.config_system.serialization]
ignore_errors = True

[mypy-abides_markets.config_system.builder]
ignore_errors = True

[mypy-abides_markets.config_system.registry]
ignore_errors = True

[mypy-abides_markets.config_system.agent_configs]
ignore_errors = True

# Reason: pandera DataFrame[Schema] return types and pydantic model_dump_json return type
[mypy-abides_markets.simulation.result]
ignore_errors = True

[mypy-abides_markets.simulation.runner]
ignore_errors = True

# Reason: legacy gym environments with untyped returns, float/int mismatches, and missing return paths
[mypy-abides_gym.*]
ignore_errors = True

# Reason: ray.air.config.RunConfig vs ray.tune.impl.config.RunConfig type mismatch (ray version compat)
[mypy-rllib_runner]
ignore_errors = True

[mypy-simple_rllib_runner]
ignore_errors = True

[mypy-rllib_exec_custom_metrics]
ignore_errors = True
