# Pre-commit hooks for ABIDES project
# See https://pre-commit.com for more information

repos:
  # Code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.12

  # Import sorting with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Linting with ruff (modern, fast alternative to flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.15
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^(version_testing/|notebooks/)

  # Type checking with mypy (currently informational only)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       args: [--ignore-missing-imports, --config-file=mypy.ini]
  #       exclude: ^version_testing/

  # Run pytest to ensure all tests pass
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: sh -c "uv run pytest abides-core/tests abides-markets/tests"
        language: system
        pass_filenames: false
        always_run: true

  # Prevent commits to main/master branch
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
