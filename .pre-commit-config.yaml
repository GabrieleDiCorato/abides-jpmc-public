# Pre-commit hooks for ABIDES project
# See https://pre-commit.com for more information

repos:
  # Code formatting with Black
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.12

  # Linting with ruff (modern, fast alternative to flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^(version_testing/|notebooks/)

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--config-file=mypy.ini]
        exclude: ^(version_testing/|notebooks/)
        additional_dependencies:
          - numpy>=2.0.0
          - pandas>=2.2.0

  # Run pytest to ensure all tests pass
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: pytest abides-core/tests abides-markets/tests
        language: system
        pass_filenames: false
        always_run: true

  # Strip notebook outputs before committing (keeps .ipynb files small)
  - repo: local
    hooks:
      - id: nb-clean
        name: nb-clean
        entry: nb-clean clean
        language: system
        files: \.ipynb$
        pass_filenames: true

  # Standard pre-commit checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
